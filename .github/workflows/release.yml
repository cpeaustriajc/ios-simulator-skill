name: Package and Release Skill

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to repackage (e.g. v1.5.0). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Package skill and upload to release
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate skill structure
        run: |
          echo "Validating ios-simulator-skill/ plugin layout..."
          test -f ios-simulator-skill/.claude-plugin/plugin.json \
            || { echo "ERROR: ios-simulator-skill/.claude-plugin/plugin.json not found"; exit 1; }
          test -f ios-simulator-skill/skills/ios-simulator-skill/SKILL.md \
            || { echo "ERROR: ios-simulator-skill/skills/ios-simulator-skill/SKILL.md not found"; exit 1; }
          test -d ios-simulator-skill/skills/ios-simulator-skill/scripts \
            || { echo "ERROR: ios-simulator-skill/skills/ios-simulator-skill/scripts not found"; exit 1; }
          echo "✅ Skill structure validated successfully"

      - name: Create skill package
        run: |
          cd ios-simulator-skill
          zip -r "../ios-simulator-skill-${RELEASE_TAG}.zip" . \
            -x "*.pyc" \
            -x "__pycache__/*" \
            -x "*.DS_Store"
          cd ..
          echo "📦 Created package: ios-simulator-skill-${RELEASE_TAG}.zip"
          ls -lh "ios-simulator-skill-${RELEASE_TAG}.zip"

      - name: Verify package contents
        run: |
          ZIP="ios-simulator-skill-${RELEASE_TAG}.zip"
          echo "Asserting expected entries are present in ${ZIP}..."
          unzip -l "$ZIP" | grep -q '\.claude-plugin/plugin\.json$' \
            || { echo "ERROR: .claude-plugin/plugin.json missing from zip"; unzip -l "$ZIP"; exit 1; }
          unzip -l "$ZIP" | grep -q 'skills/ios-simulator-skill/SKILL\.md$' \
            || { echo "ERROR: skills/ios-simulator-skill/SKILL.md missing from zip"; unzip -l "$ZIP"; exit 1; }
          unzip -t "$ZIP" > /dev/null \
            || { echo "ERROR: zip integrity check failed"; exit 1; }
          echo "✅ Package contents verified"

      - name: Upload package to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ios-simulator-skill-${{ env.RELEASE_TAG }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Release summary
        env:
          REPO_SLUG: ${{ github.repository }}
        run: |
          {
            echo "## 🎉 Release Complete"
            echo ""
            echo "**Version:** ${RELEASE_TAG}"
            echo "**Package:** ios-simulator-skill-${RELEASE_TAG}.zip"
            echo ""
            echo "### Installation"
            echo '```bash'
            echo "# Download and extract to Claude skills directory"
            echo "curl -L https://github.com/${REPO_SLUG}/releases/download/${RELEASE_TAG}/ios-simulator-skill-${RELEASE_TAG}.zip -o skill.zip"
            echo "unzip skill.zip -d ~/.claude/skills/ios-simulator-skill"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
